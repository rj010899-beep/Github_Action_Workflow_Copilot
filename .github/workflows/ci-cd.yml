name: Angular CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Workspace INIT
  # ─────────────────────────────────────────────────────────────
  workspace-init:
    name: "Stage 1: Workspace INIT"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Automated Testing (Unit, Code Review, Security)
  # ─────────────────────────────────────────────────────────────
  automated-testing:
    name: "Stage 2: Automated Testing"
    runs-on: ubuntu-latest
    needs: workspace-init
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (if cache miss)
        run: npm ci

      - name: "[Unit Tests] Run Vitest unit tests"
        run: npm test -- --watch=false

      - name: "[Code Review] Run ESLint"
        run: npm run lint

      - name: "[Security] Run npm audit"
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Build
  # ─────────────────────────────────────────────────────────────
  build:
    name: "Stage 3: Build"
    runs-on: ubuntu-latest
    needs: automated-testing
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (if cache miss)
        run: npm ci

      - name: Build Angular app for production
        run: npm run build -- --base-href /Github_Action_Workflow_Copilot/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/github-pages-app/browser

  # ─────────────────────────────────────────────────────────────
  # Stage 4: Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: "Stage 4: Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
