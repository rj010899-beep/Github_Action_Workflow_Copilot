name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-review:
    name: Call PR Review Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Build Prompt From PR-Review Agent File
        id: build-prompt
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed('No pull request context found.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const agentFile = path.join(process.env.GITHUB_WORKSPACE, '.github/Agents/PR-Review.md');
            if (!fs.existsSync(agentFile)) {
              core.setFailed('Missing .github/Agents/PR-Review.md prompt file.');
              return;
            }

            const agentPrompt = fs.readFileSync(agentFile, 'utf8');

            const prResponse = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const pr = prResponse.data;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const limitedFiles = files.slice(0, 50);
            const fileSections = limitedFiles.map((file) => {
              const patch = (file.patch || '[No patch available for this file]').slice(0, 10000);
              return [
                `### File: ${file.filename}`,
                `Status: ${file.status}, +${file.additions}/-${file.deletions}`,
                '```diff',
                patch,
                '```',
              ].join('\n');
            }).join('\n\n');

            const runtimePrompt = [
              agentPrompt,
              '',
              '---',
              '## Runtime PR Context',
              `Repository: ${owner}/${repo}`,
              `PR Number: ${pr.number}`,
              `PR Title: ${pr.title}`,
              `PR Author: ${pr.user?.login || 'unknown'}`,
              `Base Branch: ${pr.base?.ref || 'unknown'}`,
              `Head SHA: ${pr.head?.sha || 'unknown'}`,
              '',
              '## PR Description',
              pr.body || '[No description provided]',
              '',
              `## Changed Files (${files.length})`,
              fileSections,
              '',
              '## Instructions For Copilot CLI',
              'Produce only markdown review output suitable for a PR issue comment. Do not include tool logs.',
            ].join('\n');

            const promptFile = path.join(process.env.RUNNER_TEMP, 'pr-review-copilot-prompt.md');
            fs.writeFileSync(promptFile, runtimePrompt, 'utf8');
            core.setOutput('prompt_file', promptFile);

      - name: Install GitHub Copilot CLI extension
        shell: bash
        run: |
          set -euo pipefail

          if gh copilot --help >/dev/null 2>&1; then
            echo "GitHub CLI has built-in copilot command; skipping extension install."
          elif gh extension list | awk '{print $1}' | grep -qx 'github/gh-copilot'; then
            echo "GitHub Copilot extension already installed."
          else
            gh extension install github/gh-copilot
          fi

      - name: Run PR Review Agent Through GH Copilot
        id: review
        shell: bash
        env:
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          DEFAULT_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROMPT_FILE: ${{ steps.build-prompt.outputs.prompt_file }}
        run: |
          set -euo pipefail

          OUTPUT_FILE="$RUNNER_TEMP/pr-review-copilot-output.md"
          ERROR_LOG="$RUNNER_TEMP/pr-review-copilot-error.log"
          PROMPT_INLINE=$(tr '\n' ' ' < "$PROMPT_FILE" | sed -E 's/[[:space:]]+/ /g')

          : > "$ERROR_LOG"

          run_copilot_suggest() {
            local token="$1"

            if [[ -z "$token" ]]; then
              return 1
            fi

            GH_TOKEN="$token" gh copilot suggest -t gh "$PROMPT_INLINE" > "$OUTPUT_FILE" 2>"$ERROR_LOG" && return 0
            GH_TOKEN="$token" gh copilot suggest "$PROMPT_INLINE" > "$OUTPUT_FILE" 2>>"$ERROR_LOG" && return 0
            GH_TOKEN="$token" gh copilot -i "suggest $PROMPT_INLINE" > "$OUTPUT_FILE" 2>>"$ERROR_LOG" && return 0

            return 1
          }

          COPILOT_SUCCESS=false
          if run_copilot_suggest "${DEFAULT_GH_TOKEN:-}"; then
            COPILOT_SUCCESS=true
          elif run_copilot_suggest "${COPILOT_CLI_TOKEN:-}"; then
            COPILOT_SUCCESS=true
          fi

          if [[ "$COPILOT_SUCCESS" != true || ! -s "$OUTPUT_FILE" ]]; then
            {
              echo '## PR Review Agent Error'
              echo
              echo 'Copilot did not return review output with any available token path.'
              echo ''
              echo 'Tried token order: GITHUB_TOKEN, COPILOT_CLI_TOKEN'
              echo ''
              echo '### Copilot error output'
              if [[ -s "$ERROR_LOG" ]]; then
                sed -n '1,120p' "$ERROR_LOG"
              else
                echo 'No stderr output captured from gh copilot suggest.'
              fi
            } > "$OUTPUT_FILE"
          fi

          labels=()
          lc_output="$(tr '[:upper:]' '[:lower:]' < "$OUTPUT_FILE")"
          [[ "$lc_output" == *"security"* ]] && labels+=(security)
          [[ "$lc_output" == *"breaking"* ]] && labels+=(breaking-change)
          [[ "$lc_output" == *"performance"* ]] && labels+=(performance)
          [[ "$lc_output" == *"code quality"* || "$lc_output" == *"bug"* ]] && labels+=(code-quality)

          label_csv=""
          if (( ${#labels[@]} > 0 )); then
            uniq_labels=$(printf '%s\n' "${labels[@]}" | awk '!seen[$0]++')
            label_csv=$(echo "$uniq_labels" | paste -sd, -)
          fi

          {
            echo 'summary<<EOF'
            cat "$OUTPUT_FILE"
            echo 'EOF'
            echo "labels=$label_csv"
          } >> "$GITHUB_OUTPUT"

      - name: Apply Labels
        if: steps.review.outputs.labels != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const labels = '${{ steps.review.outputs.labels }}'.split(',').map((l) => l.trim()).filter(Boolean);
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels,
              });
            }

      - name: Post Result In PR Issue Thread
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- pr-review-agent-comment -->';
            const summary = JSON.parse(`${{ toJSON(steps.review.outputs.summary) }}`);
            const body = `${marker}\n${summary}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              const isBot = comment.user && comment.user.type === 'Bot';
              const hasMarker = typeof comment.body === 'string' && comment.body.includes(marker);
              return isBot && hasMarker;
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
