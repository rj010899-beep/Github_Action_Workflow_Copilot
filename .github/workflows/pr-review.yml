name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-review:
    name: Call PR Review Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Run PR Review Agent
        id: review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setOutput('summary', 'No PR context found.');
              core.setOutput('labels', '');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const agentFile = path.join(process.env.GITHUB_WORKSPACE, '.github/Agents/PR-Review.md');
            const agentExists = fs.existsSync(agentFile);

            const prResponse = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const pr = prResponse.data;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const findings = [];
            const labels = new Set();

            const secretRegex = /(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][^'\"]{8,}['\"]/i;
            const sqlRegex = /(select\s+.+\s+from\s+.+\+|where\s+.+\+|insert\s+into\s+.+\+)/i;
            const cmdRegex = /(exec\(|spawn\(|child_process|os\.system\(|subprocess\.(Popen|run)\()/i;
            const weakCryptoRegex = /(md5\(|sha1\()/i;

            for (const file of files) {
              const patch = file.patch || '';
              if (!patch) {
                continue;
              }

              const pathName = file.filename;

              if (secretRegex.test(patch)) {
                findings.push(`- **${pathName}**: Potential hardcoded credential in diff.`);
                labels.add('security');
              }

              if (sqlRegex.test(patch)) {
                findings.push(`- **${pathName}**: Potential SQL injection pattern (string-built SQL).`);
                labels.add('security');
                labels.add('bug');
              }

              if (cmdRegex.test(patch)) {
                findings.push(`- **${pathName}**: Command execution usage detected; verify input sanitization.`);
                labels.add('security');
              }

              if (weakCryptoRegex.test(patch)) {
                findings.push(`- **${pathName}**: Weak hash algorithm usage detected (MD5/SHA1).`);
                labels.add('security');
              }

              if (file.changes > 500) {
                findings.push(`- **${pathName}**: Very large change (${file.changes} lines) may reduce review quality.`);
                labels.add('code-quality');
              }
            }

            if (files.length > 20) {
              findings.push(`- PR has **${files.length} changed files**. Consider splitting into smaller PRs.`);
              labels.add('needs-review');
            }

            let body;
            if (findings.length === 0) {
              body = [
                '## ✅ PR Review Agent Result',
                '',
                'No high-confidence security or code-quality issues were detected from the changed diff.',
                '',
                '**Reviewed:**',
                '- Security patterns: ✓',
                '- Code quality patterns: ✓',
                '- PR size checks: ✓',
                '',
                `Agent definition loaded: ${agentExists ? 'Yes' : 'No'} (.github/Agents/PR-Review.md)`,
              ].join('\n');
            } else {
              body = [
                '## 🔍 PR Review Agent Findings',
                '',
                `PR: #${pr.number} - ${pr.title}`,
                '',
                '### Issues Found',
                ...findings,
                '',
                '### Recommendation',
                '- Please review and address the findings before merge.',
                '- If a finding is expected, document justification in the PR conversation.',
                '',
                `Agent definition loaded: ${agentExists ? 'Yes' : 'No'} (.github/Agents/PR-Review.md)`,
              ].join('\n');
            }

            core.setOutput('summary', body);
            core.setOutput('labels', Array.from(labels).join(','));

      - name: Apply Labels
        if: steps.review.outputs.labels != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const labels = '${{ steps.review.outputs.labels }}'.split(',').map((l) => l.trim()).filter(Boolean);
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels,
              });
            }

      - name: Post Result In PR Issue Thread
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- pr-review-agent-comment -->';
            const summary = JSON.parse(`${{ toJSON(steps.review.outputs.summary) }}`);
            const body = `${marker}\n${summary}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              const isBot = comment.user && comment.user.type === 'Bot';
              const hasMarker = typeof comment.body === 'string' && comment.body.includes(marker);
              return isBot && hasMarker;
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
